name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.02)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm binutils grub2-common xorriso mtools

    - name: Build
      run: make

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hypervisor.iso
        path: Hypervisor.iso

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download ISO artifact
      uses: actions/download-artifact@v4
      with:
        name: Hypervisor.iso

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag_name }}
        name: ${{ inputs.tag_name }}
        generate_release_notes: true
        files: Hypervisor.iso
