name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.02). Leave empty to auto-generate.'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm binutils grub2-common xorriso mtools

    - name: Build
      run: make

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hypervisor.iso
        path: Hypervisor.iso

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Determine tag name
      id: tag
      run: |
        if [ -n "${{ inputs.tag_name }}" ]; then
          echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
        else
          echo "name=v0.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT
        fi

    - name: Download ISO artifact
      uses: actions/download-artifact@v4
      with:
        name: Hypervisor.iso

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        name: ${{ steps.tag.outputs.name }}
        generate_release_notes: true
        prerelease: ${{ steps.tag.outputs.prerelease }}
        files: Hypervisor.iso
